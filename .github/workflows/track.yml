name: track

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. Sydney is UTC+10/+11, so this covers roughly
    # 6am–midnight AU east coast at a ~5-10 min effective cadence (GitHub
    # schedules often lag a few minutes), and every 30 min overnight.
    - cron: "*/5 20-23,0-14 * * *"
    - cron: "*/30 15-19 * * *"

concurrency:
  group: track
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m tracker

      - name: Commit state
        run: |
          git config user.name "restock-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "state: stock update"
            git pull --rebase origin main
            git push
          fi

      - name: Keepalive (stop GitHub disabling the schedule after 60 idle days)
        run: |
          if [ -z "$(git log -1 --since='40 days ago' --format=%H)" ]; then
            git commit --allow-empty -m "keepalive"
            git push
          fi
